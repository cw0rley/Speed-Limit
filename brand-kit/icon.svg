<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Dark background with rounded corners -->
  <rect width="1024" height="1024" rx="224" fill="#0b0d12"/>

  <!-- Top half: SPEED in bold white — represents motion/velocity -->
  <text x="512" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="220" fill="#ffffff" letter-spacing="-5">SPEED</text>

  <!-- Ampersand — the connector, in the app's red accent -->
  <text x="512" y="530" text-anchor="middle" font-family="Georgia, Times, serif" font-weight="400" font-size="160" fill="#c0392b">&amp;</text>

  <!-- Bottom half: LIMIT in bold white -->
  <text x="512" y="730" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="220" fill="#ffffff" letter-spacing="-5">LIMIT</text>

  <!-- Subtle red underline accent -->
  <rect x="312" y="770" width="400" height="6" rx="3" fill="#c0392b"/>
</svg>