<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Dark background -->
  <rect width="1024" height="1024" rx="224" fill="#0b0d12"/>

  <!-- Speed limit sign - outer red circle -->
  <circle cx="512" cy="460" r="320" fill="#c0392b"/>

  <!-- Inner white circle -->
  <circle cx="512" cy="460" r="270" fill="#ffffff"/>

  <!-- SPEED text -->
  <text x="512" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="72" fill="#333333" letter-spacing="8">SPEED</text>

  <!-- LIMIT text -->
  <text x="512" y="410" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="72" fill="#333333" letter-spacing="8">LIMIT</text>

  <!-- Speed number -->
  <text x="512" y="580" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="200" fill="#0b0d12">45</text>

  <!-- Subtle speedometer needle accent at bottom -->
  <rect x="488" y="820" width="48" height="8" rx="4" fill="#c0392b"/>
  <rect x="420" y="840" width="184" height="4" rx="2" fill="#333333" opacity="0.3"/>
</svg>